server {
  listen 80;
  server_name _;
  
  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
  gzip_min_length 1000;
  gzip_proxied any;
  gzip_disable "msie6";

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Root location
  root /usr/share/nginx/html;
  index index.html index.htm;

  # Static assets with cache
  location ~* ^.+\.(js|css|svg|jpg|jpeg|png|gif|ico|webp|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Single Page Application routing
  # Serve index.html for all routes that don't match real files/folders
  location / {
    try_files $uri $uri/ /index.html;
    
    # No cache for index.html - always get the latest version
    add_header Cache-Control "public, max-age=0, must-revalidate";
  }

  # API proxy (optional - for development)
  # Uncomment and adjust to proxy API calls to backend
  # location /api/ {
  #   proxy_pass http://backend:5000;
  #   proxy_http_version 1.1;
  #   proxy_set_header Upgrade $http_upgrade;
  #   proxy_set_header Connection 'upgrade';
  #   proxy_set_header Host $host;
  #   proxy_cache_bypass $http_upgrade;
  #   
  #   # CORS headers if needed
  #   add_header 'Access-Control-Allow-Origin' '*' always;
  #   add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
  #   add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
  # }

  # Error pages
  error_page 404 /index.html;
  error_page 500 502 503 504 /50x.html;
  
  location = /50x.html {
    root /usr/share/nginx/html;
  }

  # Deny access to hidden files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  # Deny access to backup files
  location ~ ~$ {
    deny all;
    access_log off;
    log_not_found off;
  }
}
